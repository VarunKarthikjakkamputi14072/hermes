server:
  port: 8080

spring:
  application:
    name: order-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/hermes}
    username: ${DB_USER:hermes}
    password: ${DB_PASSWORD:hermes}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        jdbc:
          batch_size: 50
    open-in-view: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      properties:
        enable.idempotence: true
        linger.ms: 5

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      application: order-api
  endpoint:
    health:
      show-details: always
